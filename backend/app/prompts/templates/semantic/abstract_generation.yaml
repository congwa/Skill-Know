metadata:
  id: semantic.abstract_generation
  name: Abstract Generation
  version: "1.0"
  category: semantic

variables:
  - name: name
    type: string
    required: true
  - name: description
    type: string
    default: ""

template: |
  请用一句话概括以下技能的核心功能（不超过 100 字）。

  技能名称：{{ name }}
  技能描述：{{ description }}

  只输出概括文本，不要其他内容。
