metadata:
  id: compression.knowledge_extraction
  name: Knowledge Extraction
  version: "1.0"
  category: compression

variables:
  - name: conversation
    type: string
    required: true
    description: 对话内容

template: |
  你是 Skill-Know 知识库的知识提取专家。
  请分析以下对话，提取出值得保存到知识库的知识点。

  ## 对话内容
  {{ conversation }}

  ## 提取规则
  1. **FAQ** — 用户提出了一个有价值的问题，AI 给出了有用的回答
  2. **CORRECTION** — 用户纠正了 AI 的错误信息（这类知识最有价值）
  3. **SUPPLEMENT** — 用户主动补充了专业知识或经验信息

  ## 过滤规则
  - 忽略闲聊、打招呼、感谢等无实质内容
  - 忽略 AI 的通用性回答
  - 只提取可以复用的、有知识价值的内容
  - 如果对话没有任何值得提取的知识，返回空列表

  ## 输出格式
  输出 JSON，不要其他内容：
  ```json
  {
    "knowledge": [
      {
        "category": "faq|correction|supplement",
        "title": "简短标题（<20字）",
        "abstract": "一句话摘要（<100字）",
        "content": "完整的知识内容（Markdown 格式）",
        "keywords": ["关键词1", "关键词2"]
      }
    ]
  }
  ```

  只输出 JSON。如果没有值得提取的知识，输出 {"knowledge": []}。
